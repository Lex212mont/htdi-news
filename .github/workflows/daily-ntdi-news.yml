name: Daily НТДИ News to Telegram

on:
  schedule:
    - cron: '30 5 * * *'  # 08:30 MSK (UTC+3)
  workflow_dispatch:       # manual trigger

jobs:
  post-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # чтобы коммитить .sent-news.json
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Fetch and post news
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python .github/scripts/post_news.py

      - name: Commit sent news state (dedup)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .sent-news.json
          git commit -m "chore: update sent-news digest state (dedup)" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
