<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTDI | IT-агрегатор</title>
<style>
  :root {
    --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2a2f45;
    --text:#f0f2ff;--text2:#8b91b5;--text3:#555e85;
    --accent:#6366f1;--accent2:#818cf8;--accent-glow:rgba(99,102,241,.25);
    --radius:16px;--radius-sm:10px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}

  /* HEADER */
  header{position:sticky;top:0;z-index:100;background:rgba(15,17,23,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
  .header-inner{max-width:1280px;margin:0 auto;padding:0 28px;height:68px;display:flex;align-items:center;gap:20px}
  .logo{display:flex;align-items:center;gap:12px;text-decoration:none;flex-shrink:0}
  .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#6366f1,#a855f7);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:11px;line-height:1.2;text-align:center;box-shadow:0 0 20px rgba(99,102,241,.4)}
  .logo-text{font-size:17px;font-weight:800;letter-spacing:-.4px;background:linear-gradient(90deg,#f0f2ff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .logo-sub{font-size:11px;color:var(--text3);margin-top:-2px}
  .search-wrap{flex:1;max-width:440px;position:relative}
  .search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
  #search{width:100%;padding:10px 16px 10px 42px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);font-size:14px;color:var(--text);outline:none;transition:all .2s}
  #search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);background:var(--surface)}
  #search::placeholder{color:var(--text3)}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .update-btn{display:flex;align-items:center;gap:7px;padding:9px 18px;background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;white-space:nowrap;box-shadow:0 0 20px rgba(99,102,241,.3)}
  .lang-btn{display:flex;align-items:center;gap:6px;padding:9px 14px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
  .lang-btn:hover{border-color:var(--accent2);color:var(--text)}
  .lang-btn.active{background:rgba(99,102,241,.15);border-color:var(--accent);color:var(--accent2)}
  /* Скрываем стандартный баннер Google Translate */
  .goog-te-banner-frame,.skiptranslate{display:none!important}
  body{top:0!important}
  #google_translate_element{display:none}
  .update-btn:hover{opacity:.9;transform:translateY(-1px)}
  .update-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
  .update-btn.spinning svg{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .progress-bar{height:2px;background:var(--surface2)}
  .progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#a855f7);width:0%;transition:width .5s ease}

  /* HERO */
  .hero{background:linear-gradient(135deg,#1a1d27 0%,#13111f 50%,#1a1d27 100%);border-bottom:1px solid var(--border);padding:36px 28px 32px;position:relative;overflow:hidden}
  .hero::before{content:'';position:absolute;top:-80px;left:-80px;width:400px;height:400px;background:radial-gradient(circle,rgba(99,102,241,.15) 0%,transparent 70%);pointer-events:none}
  .hero::after{content:'';position:absolute;bottom:-60px;right:-40px;width:300px;height:300px;background:radial-gradient(circle,rgba(168,85,247,.12) 0%,transparent 70%);pointer-events:none}
  .hero-inner{max-width:1280px;margin:0 auto;position:relative;z-index:1}
  .hero-label{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent2);margin-bottom:10px}
  .hero-label span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
  .hero h1{font-size:clamp(20px,3.5vw,34px);font-weight:800;letter-spacing:-.8px;line-height:1.15;margin-bottom:8px;background:linear-gradient(135deg,#f0f2ff 30%,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .hero-desc{font-size:14px;color:var(--text2);max-width:540px}
  .hero-stats{display:flex;gap:28px;margin-top:20px;flex-wrap:wrap}
  .stat{display:flex;flex-direction:column;gap:1px}
  .stat-num{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.5px}
  .stat-label{font-size:11px;color:var(--text3)}

  /* FILTERS */
  .filters-bar{background:rgba(15,17,23,.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:70px;z-index:90}
  .filters-inner{max-width:1280px;margin:0 auto;padding:10px 28px;display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none}
  .filters-inner::-webkit-scrollbar{display:none}
  .filter-btn{padding:7px 13px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;border-radius:30px;transition:all .2s;display:flex;align-items:center;gap:6px;flex-shrink:0}
  .filter-btn:hover{border-color:var(--accent2);color:var(--text)}
  .filter-btn.active{border-color:transparent;color:#fff;box-shadow:0 0 14px rgba(99,102,241,.3)}
  .filter-count{font-size:10px;border-radius:10px;padding:1px 6px;font-weight:700;background:rgba(255,255,255,.15)}
  .filter-btn:not(.active) .filter-count{background:var(--surface2);color:var(--text3)}

  /* SOURCE BADGES */
  .sources-row{max-width:1280px;margin:0 auto;padding:8px 28px 2px;display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none;flex-wrap:wrap}
  .sources-row::-webkit-scrollbar{display:none}
  .src-badge{font-size:10px;border:1px solid var(--border);border-radius:6px;padding:2px 8px;white-space:nowrap;color:var(--text3)}
  .src-badge.ok{border-color:rgba(52,211,153,.3);color:#34d399}
  .src-badge.err{border-color:rgba(248,113,113,.3);color:#f87171}
  .src-label{font-size:10px;color:var(--text3);flex-shrink:0}

  /* MAIN */
  main{max-width:1280px;margin:0 auto;padding:28px 28px 80px}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px}
  .section-title{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
  .last-updated{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;flex-shrink:0}
  .live-dot{width:6px;height:6px;border-radius:50%;background:#34d399;display:inline-block;flex-shrink:0}

  /* GRID */
  .news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:960px){.news-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:600px){.news-grid{grid-template-columns:1fr}}

  /* CARD */
  .card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:12px;cursor:pointer;transition:all .25s;text-decoration:none;color:inherit;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-accent,#6366f1);opacity:0;transition:opacity .25s}
  .card:hover{background:var(--surface2);transform:translateY(-2px);box-shadow:0 10px 36px rgba(0,0,0,.3),0 0 0 1px rgba(99,102,241,.15)}
  .card:hover::before{opacity:1}
  .card-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .tag{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;border:1px solid transparent}
  .source-name{font-size:11px;color:var(--text3);font-weight:500}
  .card-date{margin-left:auto;font-size:10px;color:var(--text3);white-space:nowrap;background:var(--surface2);padding:2px 7px;border-radius:5px}
  .card-title{font-size:14px;font-weight:700;line-height:1.4;color:var(--text);letter-spacing:-.1px}
  .card-desc{font-size:12px;color:var(--text2);line-height:1.6;flex:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .card-ntdi{font-size:11px;background:rgba(251,146,60,.1);border:1px solid rgba(251,146,60,.2);border-radius:8px;padding:8px 10px;line-height:1.5;color:#fb923c}
  .card-ntdi strong{font-weight:700}
  .card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border);margin-top:auto}
  .read-link{font-size:11px;color:var(--accent2);font-weight:600;display:flex;align-items:center;gap:4px;transition:gap .2s}
  .card:hover .read-link{gap:7px}
  .card.featured{grid-column:span 2}
  .card.featured .card-title{font-size:17px}
  .card.featured .card-desc{-webkit-line-clamp:4}
  @media(max-width:960px){.card.featured{grid-column:span 1}}

  /* SKELETON */
  .sk{background:var(--surface2);border-radius:5px;animation:shimmer 1.5s ease-in-out infinite}
  @keyframes shimmer{0%,100%{opacity:.4}50%{opacity:.7}}
  .skel{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:10px;pointer-events:none}

  /* EMPTY */
  .empty{grid-column:1/-1;text-align:center;padding:64px 24px;color:var(--text3)}
  .empty h3{font-size:16px;color:var(--text2);margin:12px 0 6px}

  /* TOAST */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:1000;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4)}
  .toast.show{transform:translateX(-50%) translateY(0)}

  /* FOOTER */
  footer{background:var(--surface);border-top:1px solid var(--border);padding:20px 24px;text-align:center;font-size:12px;color:var(--text3)}
  footer a{color:var(--accent2);text-decoration:none}
  .social-row{display:flex;justify-content:center;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .social-link{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:all .2s;text-decoration:none}
  .social-link:hover{border-color:var(--accent2);color:#fff;background:var(--surface);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:500;opacity:0;pointer-events:none;transition:opacity .25s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-44%);z-index:501;width:min(680px,94vw);max-height:82vh;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.6);opacity:0;transition:opacity .25s,transform .25s}
  .modal-overlay.open .modal{opacity:1;transform:translate(-50%,-50%)}
  .modal-header{padding:20px 20px 0;display:flex;gap:12px;align-items:flex-start}
  .modal-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:10px}
  .modal-title{font-size:18px;font-weight:800;line-height:1.35;color:var(--text);letter-spacing:-.3px}
  .modal-close{margin-left:auto;flex-shrink:0;width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .15s}
  .modal-close:hover{background:var(--border);color:var(--text)}
  .modal-body{padding:16px 20px;overflow-y:auto;flex:1;font-size:14px;color:var(--text2);line-height:1.75}
  .modal-body p{margin-bottom:10px}
  .modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end}
  .modal-source-btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:opacity .2s}
  .modal-source-btn:hover{opacity:.88}
  .card{cursor:pointer}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="#" class="logo">
      <div class="logo-icon">HT<br>DI</div>
      <div>
        <div class="logo-text">HTDI.by</div>
      </div>
    </a>
    <div class="search-wrap">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Поиск по новостям…">
    </div>
    <div class="header-right">
      <div id="google_translate_element"></div>
      <button class="lang-btn" id="langBtn" onclick="toggleLang()">🌐 RU</button>

        Обновить
      </button>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</header>

<section class="hero">
  <div class="hero-inner">
    <div class="hero-label"><span></span>Live</div>
    <h1>IT-новости Беларуси<br>и мировые тренды</h1>
    <p class="hero-desc">AI, кибербезопасность, финтех, регулирование и цифровая экономика в реальном времени.</p>
    <div class="hero-stats">
      <div class="stat"><span class="stat-num" id="stat-total">—</span><span class="stat-label">новостей</span></div>
      <div class="stat"><span class="stat-num" id="stat-by">—</span><span class="stat-label">из Беларуси 🇧🇾</span></div>
      <div class="stat"><span class="stat-num" id="stat-ok">—</span><span class="stat-label">источников онлайн</span></div>
      <div class="stat"><span class="stat-num">8</span><span class="stat-label">категорий</span></div>
    </div>
  </div>
</section>

<div class="filters-bar">
  <div class="filters-inner" id="filters"></div>
</div>

<main>
  <div class="section-header">
    <span class="section-title" id="sectionTitle">Все новости</span>
    <span class="last-updated" id="lastUpdated"><span class="live-dot"></span>Загрузка…</span>
  </div>

  <div class="news-grid" id="grid"></div>
</main>

function stripHtml(h){ const d=document.createElement('div'); d.innerHTML=h; return (d.textContent||'').trim() }
function trunc(s,n){ return s.length>n?s.slice(0,n)+'…':s }

function fmtDate(d){
  if(!d) return '';
  const dt = d instanceof Date ? d : new Date(d);
  if(isNaN(dt)) return String(d);
  const diff = Math.floor((Date.now()-dt)/86400000);
  if(diff===0) return 'Сегодня';
  if(diff===1) return 'Вчера';
  if(diff<=6) return diff+'д. назад';
  return dt.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
}

function categorize(title, desc, defaultCat){
  const t = (title+' '+desc).toLowerCase();
  for(const cat of ['by','ai','cyber','infra','software','regulation','education','construction']){
    for(const kw of KW[cat]){
      const re = new RegExp(kw);
      if(re.test(t)) return cat;
    }
  }
  return defaultCat;
}

// ═══════════════════════════════════════════════
//  ЗАГРУЗКА ДАННЫХ
// ═══════════════════════════════════════════════
function parseFeedXml(xml, src){
  const doc = new DOMParser().parseFromString(xml, 'application/xml');
  if(doc.querySelector('parsererror')) throw new Error('XML parse error');

  // RSS 2.0 → <item>, Atom → <entry>
  let items = [...doc.querySelectorAll('item')];
  if(!items.length) items = [...doc.querySelectorAll('entry')];
  if(!items.length) throw new Error('no items');

  const get = (el, tag) => {
    const node = el.querySelector(tag);
    return node ? (node.textContent || '').trim() : '';
  };

  return items.slice(0, src.max).map((item, i) => {
    const isAtom = item.tagName === 'entry';
    const title = get(item, 'title');
    const rawDesc = isAtom
      ? (get(item, 'summary') || get(item, 'content'))
      : (get(item, 'description') || get(item, 'content\\:encoded') || get(item, 'encoded'));
    const desc = trunc(stripHtml(rawDesc), 220);

    let link = '';
    if(isAtom){
      const linkEl = item.querySelector('link[rel="alternate"]') || item.querySelector('link');
      link = linkEl ? (linkEl.getAttribute('href') || linkEl.textContent.trim()) : '';
    } else {
      link = get(item, 'link') || get(item, 'guid');
    }

    const pubRaw = isAtom
      ? (get(item, 'published') || get(item, 'updated'))
      : (get(item, 'pubDate') || get(item, 'updated'));

    const fullDesc = trunc(stripHtml(rawDesc), 2000);
    return {
      id: src.id + '-' + i,
      cat: categorize(title, desc, src.cat),
      flag: src.flag,
      source: src.name,
      date: pubRaw ? new Date(pubRaw) : new Date(),
      title,
      desc,
      fullDesc,
      url: link || '#',
    };
  });
}

async function fetchSource(src){
  const url = PROXY + encodeURIComponent(src.url);
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), 12000);
  try{
    const r = await fetch(url, {signal:ctrl.signal});
    clearTimeout(timer);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const text = await r.text();
    return parseFeedXml(text, src);
  } catch(e) { clearTimeout(timer); throw e; }
}

async function loadAllFeeds(){
  if(loading) return;
  loading = true;
  srcStatus = {};
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.classList.add('spinning');
  setProgress(8);
  showSkeleton();
  showToast('Загружаю '+SOURCES.length+' источников…');

  const results = await Promise.allSettled(SOURCES.map(s=>fetchSource(s)));

  const live = [];
  let ok = 0;
  results.forEach((r,i)=>{
    const s = SOURCES[i];
    if(r.status==='fulfilled'){ live.push(...r.value); srcStatus[s.id]='ok'; ok++; }
    else { srcStatus[s.id]='err'; console.warn(s.name, r.reason?.message); }
  });

  live.sort((a,b)=>b.date-a.date);
  NEWS = [...EDITORIAL, ...live];

  setProgress(100);
  setTimeout(()=>setProgress(0), 700);
  loading = false;
  btn.disabled = false;
  btn.classList.remove('spinning');

  renderCounts();
  renderGrid();
  renderSourceBadges();

  const now = new Date();
  document.getElementById('stat-ok').textContent = ok;
  document.getElementById('lastUpdated').innerHTML =
    `<span class="live-dot"></span>${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} · ${ok}/${SOURCES.length} источников`;

  if(ok===0) showToast('⚠️ Источники не ответили. Показаны редакционные материалы.');
  else showToast(`✅ ${live.length} новостей из ${ok} источников`);
}

function renderGrid(){

  if(!items.length){

    return;
  }

  // Сохраняем новости в глобальный индекс для доступа из модального окна
  window._newsIndex = {};
  items.forEach(n => { window._newsIndex[n.id] = n; });

  grid.innerHTML = items.map((n,i)=>{
    const cat = CATS[n.cat]||CATS.world;
    const featured = i<2 && currentFilter==='all' && !currentSearch && n.cat!=='ntdi';
    const dateStr = n.date instanceof Date ? fmtDate(n.date) : (n.date||'');
    return `<div class="card${featured?' featured':''}" onclick="openModal('${n.id}')"
        style="--card-accent:${cat.color}">
      <div class="card-meta">
        <span class="tag" style="background:${cat.bg};color:${cat.color};border-color:${cat.bdr}">${n.flag} ${cat.label.replace(/[^\w\s\/]/g,'').trim()}</span>
        <span class="source-name">${n.source}</span>
        <span class="card-date">${dateStr}</span>
      </div>
      <div class="card-title">${n.title}</div>
      <div class="card-desc">${n.desc}</div>
      ${n.ntdi?`<div class="card-ntdi"><strong>💬 HTDI:</strong> ${n.ntdi}</div>`:''}
      <div class="card-footer">
        <span class="read-link">Читать →</span>
        <span style="font-size:10px;color:var(--text3)">${n.flag} ${n.source}</span>
      </div>
    </div>`;
  }).join('');
}

function getFiltered(){
  return NEWS.filter(n=>{
    const mc = currentFilter==='all'||n.cat===currentFilter;
    const q = currentSearch.toLowerCase();
    const ms = !q||[n.title,n.desc,n.source].some(s=>s.toLowerCase().includes(q));
    return mc&&ms;
  });
}

function setFilter(cat){
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    const active = b.dataset.cat===cat;
    b.classList.toggle('active',active);
    const c = CATS[b.dataset.cat];
    if(active){
      b.style.background = cat==='all'?'linear-gradient(135deg,#6366f1,#a855f7)':c.color;
      b.style.borderColor='transparent';
      b.style.color='#fff';
    } else {
      b.style.background='';
      b.style.borderColor='';
      b.style.color='';
    }
  });
  renderGrid();
}

function openModal(id){
  const n = (window._newsIndex||{})[id];
  if(!n) return;
  const cat = CATS[n.cat]||CATS.world;
  const dateStr = n.date instanceof Date ? fmtDate(n.date) : (n.date||'');

  document.getElementById('modalMeta').innerHTML =
    `<span class="tag" style="background:${cat.bg};color:${cat.color};border-color:${cat.bdr}">${n.flag} ${cat.label.replace(/[^\w\s\/]/g,'').trim()}</span>
     <span class="source-name">${n.source}</span>
     <span class="card-date">${dateStr}</span>`;

  document.getElementById('modalTitle').textContent = n.title;

  const body = document.getElementById('modalBody');
  const text = n.fullDesc || n.desc || '';
  body.innerHTML = text
    ? text.split(/\n{2,}/).map(p=>`<p>${p}</p>`).join('')
    : '<p style="color:var(--text3);font-style:italic">Описание недоступно в RSS-ленте. Читайте полный материал на сайте источника.</p>';

  const link = document.getElementById('modalLink');
  if(n.url && n.url !== '#'){
    link.href = n.url;
    link.style.display = 'inline-flex';
  } else {
    link.style.display = 'none';
  }

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e){
  if(e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if(e.key === 'Escape') closeModal();
});

let translateReady = false;
let langRu = false;

function googleTranslateElementInit(){
  new google.translate.TranslateElement(
    { pageLanguage:'auto', includedLanguages:'ru,en', autoDisplay:false },
    'google_translate_element'
  );
  translateReady = true;
}

function toggleLang(){
  const btn = document.getElementById('langBtn');
  if(!langRu){
    // Переключить на русский
    const tryTranslate = () => {
      const sel = document.querySelector('.goog-te-combo');
      if(sel){ sel.value='ru'; sel.dispatchEvent(new Event('change')); }
    };
    if(translateReady){ tryTranslate(); }
    else {
      // Подождать загрузки скрипта
      const t = setInterval(()=>{ if(translateReady){ tryTranslate(); clearInterval(t); } }, 200);
    }
    btn.textContent = '🌐 EN';
    btn.classList.add('active');
    langRu = true;
  } else {
    // Вернуть оригинал
    const sel = document.querySelector('.goog-te-combo');
    if(sel){ sel.value=''; sel.dispatchEvent(new Event('change')); }
    // Принудительно сбросить через iframe-метод
    const frame = document.querySelector('#:1\\.container');
    if(frame){ frame.contentDocument?.querySelector('#:1\\.restore')?.click(); }
    btn.textContent = '🌐 RU';
    btn.classList.remove('active');
    langRu = false;
    setTimeout(()=>{ location.reload(); }, 200);
  }
}
