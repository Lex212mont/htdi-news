name: Daily Telegram News

on:
  schedule:
    - cron: '30 5 * * *'  # 8:30 Minsk (UTC+3)
  workflow_dispatch:

jobs:
  post-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send test message to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: '-1003929211757'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${CHAT_ID} \
            -d parse_mode=HTML \
            -d text="<b>🗞 Тест от НТДИ</b>\n\nАвтоматическая публикация работает!\nСайт: https://htdi.by" 